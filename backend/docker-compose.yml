services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env.production
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --proxy-headers
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - uploads:/app/uploads

  worker:
    build: .
    restart: unless-stopped
    env_file: .env.production
    command: celery -A backend.workers.celery_app.celery_app worker --loglevel=INFO -Q ai,default
    depends_on:
      - redis
    volumes:
      - uploads:/app/uploads

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  uploads:
